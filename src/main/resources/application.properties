spring.application.name=vectordb

# Server port
server.port=8080

# Serve static files from /static (index.html lives here)
spring.web.resources.static-locations=classpath:/static/

# Increase max request size for large document pastes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson - pretty print JSON in dev
spring.jackson.serialization.indent-output=false

# Actuator - expose health and info endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.vectordb=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
